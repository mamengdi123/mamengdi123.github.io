<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>粉止水导航官网</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background-color: #ffd6e7;
            padding: 40px 16px;
        }
        .wrap {
            background: #ffe6f0;
            border-radius: 26px;
            padding: 40px 24px;
            max-width: 520px;
            margin: 0 auto;
        }
        .top-title {
            background: #ffcce0;
            border-radius: 999px;
            text-align: center;
            padding: 14px 10px;
            font-size: 22px;
            color: #c7487e;
            font-weight: bold;
            margin-bottom: 32px;
            position: relative;
        }
        .star-heart {
            position: absolute;
            right: -12px;
            top: -12px;
            font-size: 38px;
        }
        .avatar-box {
            width: 160px;
            height: 160px;
            margin: 0 auto 36px;
            background: #ffd6e7;
            border-radius: 50%;
            padding: 6px;
        }
        .avatar-box img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            display: block;
        }
        .btn-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .btn-item {
            width: 100%;
            background: linear-gradient(90deg, #fff5f9, #ffcce0);
            border-radius: 999px;
            text-align: center;
            padding: 18px 10px;
            font-size: 20px;
            color: #c7487e;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
        }
        /* 不可点击按钮样式 */
        .btn-disabled {
            cursor: default;
            pointer-events: none;
        }
        .footer-area {
            margin-top: 40px;
            text-align: center;
            color: #c7487e;
            font-size: 20px;
        }
        .footer-heart {
            margin: 20px 0 10px;
            font-size: 32px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="top-title">
            粉止水导航官网
            <span class="star-heart">💖</span>
        </div>

        <!-- 已替换成你上传的男生头像图 -->
        <div class="avatar-box">
            <img src="https://p3-flow-image-sign.byteimg.com/tos-cn-i-a9rns2rl98/604f3f448c3a4138a31041144d41970c~tplv-a9rns2rl98-image.image" alt="头像">
        </div>

        <div class="btn-list">
            <!-- 粉止水卡网 -->
            <a href="https://caiyunqk.cn/shop/8F8BQ6LT" class="btn-item">
                <span>🚀</span>粉止水卡网
            </a>
            <!-- 上号、查询器 -->
            <a href="https://wwbas.lanzouv.com/iil7Z3uxanni" class="btn-item">
                <span>⬇️</span>上号、查询器（密码fzsnb）
            </a>
            <!-- 不可点击按钮 -->
            <div class="btn-item btn-disabled">
                <span>🛡️</span>粉止水主频道@jipin66678
            </div>
        </div>

        <div class="footer-heart">❤️</div>
        <div class="footer-area">
            © 2026
        </div>
    </div>
</body>
</html>
