<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>粉止水导航</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, sans-serif;
        }
        body {
            background: #ffffff;
            padding: 40px 20px;
        }
        h1 {
            text-align: center;
            font-size: 48px;
            color: #000;
            margin-bottom: 40px;
            font-weight: bold;
        }
        /* 顶部渐变可点击按钮 */
        .box-link {
            display: block;
            background: linear-gradient(90deg, #ffdd00, #28a745);
            border-radius: 24px;
            padding: 45px 30px;
            margin-bottom: 24px;
            text-decoration: none;
        }
        .box-link h2 {
            font-size: 42px;
            color: #000;
            margin-bottom: 8px;
        }
        .box-link p {
            font-size: 30px;
            color: #0055ff;
        }
        /* 普通白色卡片（可点击） */
        .box-normal {
            background: #fff;
            border: 1px solid #eee;
            border-radius: 20px;
            padding: 35px 25px;
            margin-bottom: 20px;
            text-decoration: none;
            display: block;
        }
        .box-normal h2 {
            font-size: 36px;
            color: #0066ff;
            margin-bottom: 10px;
        }
        .box-normal p {
            font-size: 22px;
            color: #666;
        }
        /* 禁止点击静态卡片（第三个） */
        .box-static {
            background: #fff;
            border: 1px solid #eee;
            border-radius: 20px;
            padding: 35px 25px;
            pointer-events: none; /* 禁止点击 */
        }
        .box-static h2 {
            font-size: 36px;
            color: #0066ff;
            margin-bottom: 10px;
        }
        .box-static p {
            font-size: 22px;
            color: #666;
        }
    </style>
</head>
<body>
    <h1>粉止水导航</h1>

    <!-- 第一个渐变按钮：改为卡网，可点击跳转 -->
    <a class="box-link" href="http://caiyunqk.cn/shop/8F8BQ6LT" target="_blank">
        <h2>卡网</h2>
        <p>点击进入</p>
    </a>

    <!-- 第二个：粉止水工具库 -->
    <a class="box-normal" href="https://wwbas.lanzouv.com/iiI7Z3uxanni">
        <h2>粉止水工具库</h2>
        <p>所有文件提取密码：FZSNB</p>
    </a>

    <!-- 第三个：无法点击，下方文字@hautjm -->
    <div class="box-static">
        <h2>粉止水社区</h2>
        <p>@hautjm</p>
    </div>
</body>
</html>
